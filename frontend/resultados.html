<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (!localStorage.getItem('nexo_token')) {
            window.location.href = 'login.html';
        }
    </script>
    <title>NEXO - Gestión de Rutas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1E3A5F;
            --secondary: #F4A261;
            --bg: #f0f2f5;
            --white: #ffffff;
            --border: #e0e0e0;
        }

        body.dark-mode {
            --bg: #121212;
            --white: #1e1e1e;
            --border: #333;
            --primary: #8FA2B0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--primary);
            transition: all 0.3s ease;
        }

        .header {
            background: linear-gradient(135deg, #1E3A5F, #2c4a6e);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 98%;
            margin: 20px auto;
            padding: 0 10px;
        }

        /* Grid Layout */
        .rutas-grid {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 20px;
            align-items: flex-start;
        }

        .movil-col {
            min-width: 350px;
            max-width: 350px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            border-top: 5px solid var(--secondary);
        }

        .movil-header {
            padding: 15px;
            background: rgba(30, 58, 95, 0.05);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .movil-header h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .movil-stats {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .clientes-lista {
            padding: 10px;
            flex-grow: 1;
            min-height: 100px;
        }

        .cliente-card {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            position: relative;
            cursor: grab;
            transition: transform 0.2s;
        }

        .cliente-card:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .cliente-card .numero {
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
        }

        .cliente-card .nombre {
            font-weight: 600;
            font-size: 14px;
        }

        .cliente-card .distancia {
            display: block;
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .btn-transferir {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            font-size: 14px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn-transferir:hover {
            opacity: 1;
        }

        .movil-footer {
            padding: 15px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .btn-wa {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* Modal Transferencia */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-color);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            height: 10px;
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #eee;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>
            <img src="assets/img/LogoNexo.png" alt="NEXO"
                style="height: 35px; vertical-align: middle; margin-right: 10px;">
            Gestión de Rutas
        </h1>
        <button onclick="window.close()"
            style="background:none; border:1px solid white; color:white; padding:5px 15px; border-radius:5px; cursor:pointer;">
            <i class="fas fa-times"></i> Salir
        </button>
    </div>

    <div class="container">
        <div id="rutasGrid" class="rutas-grid">
            <!-- Se carga dinámicamente -->
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="btn-primary" onclick="enviarTodas()"
                style="width: auto; padding: 15px 30px; font-weight: bold; background: #25D366;">
                <i class="fab fa-whatsapp"></i> ENVIAR TODAS LAS RUTAS A LOS CHOFERES
            </button>
        </div>
    </div>

    <!-- Modal para Transferir Cliente -->
    <div id="modalTransfer" class="modal">
        <div class="modal-content">
            <h3>Transferir Cliente</h3>
            <p id="transferClienteNombre" style="font-size: 14px; margin-top: 5px; color: #666;"></p>
            <select id="selectMovilDestino"></select>
            <button class="btn-primary" onclick="confirmarTransferencia()">Transferir Ahora</button>
            <button onclick="cerrarModal()"
                style="background:none; border:none; color:#666; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        let rutasData = JSON.parse(localStorage.getItem('rutasGeneradas') || '{}');
        let clienteEnTransferencia = null;
        let movilOrigenIdx = null;

        // Initialize Dark Mode from localStorage
        (function initDarkMode() {
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
            }
        })();

        function renderRutas() {
            const grid = document.getElementById('rutasGrid');
            grid.innerHTML = '';

            if (!rutasData.moviles) return;

            rutasData.moviles.forEach((movil, mIdx) => {
                const col = document.createElement('div');
                col.className = 'movil-col';

                col.innerHTML = `
                    <div class="movil-header">
                        <h2>Móvil #${movil.movil}</h2>
                        <div class="movil-stats">
                            <span><i class="fas fa-box"></i> ${movil.clientes.length}</span>
                            <span><i class="fas fa-road"></i> ${movil.distancia_total} km</span>
                        </div>
                    </div>
                    <div class="clientes-lista">
                        ${movil.clientes.map((c, cIdx) => `
                            <div class="cliente-card">
                                <span class="numero">${cIdx + 1}</span>
                                <span class="nombre">${c.nombre}</span>
                                <span class="distancia">Hacia sig: ${cIdx === movil.clientes.length - 1 ? 'FIN' : c.distancia_siguiente + ' km'}</span>
                                <button class="btn-transferir" onclick="abrirTransfer(${mIdx}, ${cIdx})" title="Enviar a otro móvil">
                                    <i class="fas fa-exchange-alt"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                    <div class="movil-footer">
                        <button class="btn-wa" onclick="enviarWhatsApp(${mIdx})">
                            <i class="fab fa-whatsapp"></i> WhatsApp
                        </button>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function abrirTransfer(mIdx, cIdx) {
            movilOrigenIdx = mIdx;
            clienteEnTransferencia = rutasData.moviles[mIdx].clientes[cIdx];

            document.getElementById('transferClienteNombre').textContent = clienteEnTransferencia.nombre;

            const select = document.getElementById('selectMovilDestino');
            select.innerHTML = '';
            rutasData.moviles.forEach((m, idx) => {
                if (idx !== mIdx) {
                    const opt = document.createElement('option');
                    opt.value = idx;
                    opt.textContent = `Móvil #${m.movil}`;
                    select.appendChild(opt);
                }
            });

            document.getElementById('modalTransfer').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modalTransfer').style.display = 'none';
        }

        function confirmarTransferencia() {
            const destIdx = parseInt(document.getElementById('selectMovilDestino').value);

            // Remover de origen
            rutasData.moviles[movilOrigenIdx].clientes = rutasData.moviles[movilOrigenIdx].clientes.filter(c => c.id !== clienteEnTransferencia.id);

            // Agregar a destino
            rutasData.moviles[destIdx].clientes.push(clienteEnTransferencia);

            // Recalcular estadísticas básicas (opcional, simplificado)
            recalcularRutas();

            cerrarModal();
            renderRutas();

            // Guardar cambios localmente
            localStorage.setItem('rutasGeneradas', JSON.stringify(rutasData));
        }

        function recalcularRutas() {
            rutasData.moviles.forEach(m => {
                // Esto es una simplificación, en producción deberías pedir al backend recalcular distancias
                // Aquí solo actualizamos el contador de clientes
                m.distancia_total = "...";
            });
        }

        function generarMensajeWA(movil) {
            const link = `http://localhost:8080/ruta.html?token=${movil.token}`;

            let listaClientesTxt = "";
            movil.clientes.forEach((c, index) => {
                const mapsUrl = `https://www.google.com/maps?q=${c.latitud},${c.longitud}`;
                listaClientesTxt += `${index + 1}. *${c.nombre}*\n📍 ${mapsUrl}\n\n`;
            });

            return encodeURIComponent(`📦 *NEXO - Tu ruta de hoy* 📦\n\n🚚 *Móvil ${movil.movil}*\n📋 Total Clientes: ${movil.clientes.length}\n\n${listaClientesTxt}🔗 *Acceder al Sistema de Chofer:* ${link}`);
        }

        function enviarWhatsApp(idx) {
            const movil = rutasData.moviles[idx];
            window.open(`https://api.whatsapp.com/send?text=${generarMensajeWA(movil)}`, '_blank');
        }

        function enviarTodas() {
            rutasData.moviles.forEach((m, idx) => {
                setTimeout(() => {
                    window.open(`https://api.whatsapp.com/send?text=${generarMensajeWA(m)}`, '_blank');
                }, idx * 500);
            });
        }

        renderRutas();
    </script>
</body>

</html>
