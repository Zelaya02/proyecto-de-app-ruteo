<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO | Acceso Corporativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #1c7efe;
            --primary-light: #368af0;
            --secondary: #F4A261;
            --accent: #E76F51;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.75);
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg: #075ba9;
            --card-bg: rgba(5, 114, 169, 0.65);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            --primary: #38bdf8;
            --primary-light: #7dd3fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, hsla(210, 100%, 93%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(21, 81%, 90%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(210, 100%, 93%, 1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
            overflow: hidden;
        }

        body.dark-mode {
            background-image:
                radial-gradient(at 0% 0%, hsla(210, 40%, 15%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(21, 40%, 15%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(210, 40%, 15%, 1) 0, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
        }

        .brand-header {
            margin-bottom: 40px;
        }

        .logo {
            height: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .login-card h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .login-card p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: transparent;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(244, 162, 97, 0.1);
            background: var(--white);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(30, 58, 95, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 58, 95, 0.3);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-msg {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #fca5a5;
            animation: shake 0.5s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer-info {
            margin-top: 30px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        .footer-info a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-header">
                <img src="assets/img/LogoNexo.png" alt="NEXO" class="logo">
                <h1>Bienvenido de nuevo</h1>
                <p>Ingresa tus credenciales corporativas</p>
            </div>

            <div id="errorMsg" class="error-msg">
                <i class="fas fa-shield-alt"></i> Usuario o clave incorrectos
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" id="username" placeholder="Tu nombre de usuario" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span id="btnText">Iniciar Sesión</span>
                    <div id="loader" class="loader"></div>
                </button>
            </form>

            <div class="footer-info">
                NEXO Routing Platform &copy; 2026<br>
                <a href="#">Soporte Técnico</a> &bull; <a href="#">Seguridad</a>
            </div>
        </div>
    </div>

    <script>
        // Initialize Dark Mode from localStorage
        (function initDarkMode() {
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
            }
        })();

        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const errorDiv = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // UI Feedback
            btnText.textContent = 'Verificando...';
            loader.style.display = 'block';
            btnLogin.disabled = true;
            errorDiv.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const response = await fetch('http://localhost:8080/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('nexo_user', data.usuario);
                    localStorage.setItem('nexo_token', data.token);

                    // Efecto de éxito antes de redirigir
                    btnText.textContent = 'Acceso concedido';
                    btnLogin.style.background = '#2ecc71';

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    throw new Error(data.message || 'Credenciales inválidas');
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.style.display = 'block';
                document.getElementById('password').value = '';
                btnText.textContent = 'Iniciar Sesión';
            } finally {
                loader.style.display = 'none';
                btnLogin.disabled = false;
            }
        });
    </script>
</body>

</html>
