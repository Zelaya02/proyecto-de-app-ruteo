<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (localStorage.getItem('mivoto_token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
    <title>Mi Voto | Acceso al Sistema de Asambleas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0D552C;
            --primary-dark: #073D1F;
            --primary-light: #1A7A3A;
            --accent: #2ECC71;
            --accent-glow: #27AE60;
            --gold: #B8860B;
            --gold-light: #D4A017;
            --text: #1A1D23;
            --text-light: #6B7280;
            --text-white: #F8FAFC;
            --bg-card: rgba(255, 255, 255, 0.97);
            --border: rgba(13, 85, 44, 0.15);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow: 0 15px 35px -8px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.18);
            --input-bg: #F7F9F8;
            --error-bg: #FEF2F2;
            --error-text: #DC2626;
            --error-border: #FECACA;
            --success-bg: #F0FDF6;
            --success-text: #0D552C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(155deg, #0A4622 0%, #0D552C 30%, #0F5F32 60%, #073D1F 100%);
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Patrón de fondo geométrico */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 15% 25%, rgba(46, 204, 113, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 65%, rgba(184, 134, 11, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(13, 85, 44, 0.15) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Líneas sutiles decorativas */
        .bg-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(0deg, transparent 49.5%, rgba(255, 255, 255, 0.015) 49.5%, rgba(255, 255, 255, 0.015) 50.5%, transparent 50.5%),
                linear-gradient(90deg, transparent 49.5%, rgba(255, 255, 255, 0.015) 49.5%, rgba(255, 255, 255, 0.015) 50.5%, transparent 50.5%);
            background-size: 80px 80px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        .login-container {
            width: 100%;
            max-width: 470px;
            padding: 24px;
            position: relative;
            z-index: 2;
            animation: fadeSlideUp 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 48px 40px 40px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.25);
        }

        /* Borde superior decorativo */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--gold-light), var(--accent));
            border-radius: 0 0 12px 12px;
            opacity: 0.8;
        }

        .brand-header {
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px -8px rgba(13, 85, 44, 0.35);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.15) 50%, transparent 60%);
            transition: transform 0.4s;
        }

        .logo-icon:hover {
            transform: translateY(-3px) rotate(-2deg);
            box-shadow: 0 14px 30px -6px rgba(13, 85, 44, 0.45);
        }

        .logo-icon:hover::after {
            transform: translateX(100%);
        }

        .logo-icon i {
            font-size: 36px;
            color: white;
            z-index: 1;
        }

        .login-card h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.6px;
            color: var(--primary-dark);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .login-card h1 .accent {
            color: var(--accent-glow);
        }

        .login-card .subtitle {
            color: var(--text-light);
            font-size: 14.5px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .error-msg {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 28px;
            display: none;
            font-size: 13.5px;
            font-weight: 600;
            text-align: center;
            border: 1px solid var(--error-border);
            animation: shakeError 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .error-msg.visible {
            display: flex;
        }

        .error-msg i {
            font-size: 16px;
            color: #EF4444;
        }

        @keyframes shakeError {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-3px);
            }
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 9px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-light);
            padding-left: 4px;
            transition: color 0.2s;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            color: #9CA3AF;
            font-size: 17px;
            transition: all 0.25s ease;
            z-index: 1;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 15px 18px 15px 50px;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 14.5px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.2px;
        }

        .form-group input::placeholder {
            color: #B0B8C1;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .form-group input:hover {
            background: #F0F3F1;
            border-color: rgba(13, 85, 44, 0.2);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.12), 0 4px 12px rgba(0, 0, 0, 0.04);
            transform: translateY(-1px);
        }

        .form-group input:focus+i {
            color: var(--accent-glow);
            transform: scale(1.08);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: #9CA3AF;
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s;
            z-index: 1;
        }

        .password-toggle:hover {
            color: var(--accent-glow);
        }

        .password-toggle i {
            font-size: 16px;
            position: static;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px -8px rgba(13, 85, 44, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -6px rgba(13, 85, 44, 0.5);
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px -4px rgba(13, 85, 44, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.75;
            transform: none;
            cursor: wait;
            pointer-events: none;
        }

        .btn-login .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
        }

        .btn-login.loading .loader {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            opacity: 0.9;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer-info {
            margin-top: 36px;
            font-size: 12.5px;
            font-weight: 500;
            color: #9CA3AF;
            text-align: center;
            border-top: 1px solid #E5E7EB;
            padding-top: 22px;
            letter-spacing: 0.2px;
        }

        .footer-info a {
            color: var(--accent-glow);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
            position: relative;
        }

        .footer-info a:hover {
            color: var(--primary);
        }

        .footer-info .separator {
            margin: 0 12px;
            color: #D1D5DB;
        }

        .watermark {
            position: fixed;
            bottom: 20px;
            right: 28px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 600;
            letter-spacing: 1.5px;
            z-index: 1;
            pointer-events: none;
        }

        @media (max-width: 520px) {
            .login-card {
                padding: 36px 24px 28px;
                border-radius: 20px;
            }

            .login-card::before {
                left: 16px;
                right: 16px;
            }

            .logo-icon {
                width: 68px;
                height: 68px;
                border-radius: 18px;
            }

            .logo-icon i {
                font-size: 30px;
            }

            .login-card h1 {
                font-size: 26px;
            }

            .form-group input {
                padding: 14px 16px 14px 46px;
                font-size: 14px;
            }

            .btn-login {
                padding: 14px;
                font-size: 15px;
            }
        }

        @media (max-width: 380px) {
            .login-container {
                padding: 16px;
            }

            .login-card {
                padding: 30px 18px 24px;
            }

            .login-card h1 {
                font-size: 23px;
            }

            .footer-info {
                font-size: 11px;
            }

            .footer-info .separator {
                margin: 0 8px;
            }
        }
    </style>
</head>

<body>
    <!-- Patrón de fondo -->
    <div class="bg-pattern"></div>
    <div class="bg-lines"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Cabecera de marca -->
            <div class="brand-header">
                <div class="logo-icon">
                    <i class="fas fa-vote-yea"></i>
                </div>
                <h1>Mi <span class="accent">Voto</span></h1>
                <p class="subtitle">Sistema de Gestión de Asambleas Cooperativas</p>
            </div>

            <!-- Mensaje de error -->
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span>Usuario o contraseña incorrectos</span>
            </div>

            <!-- Formulario de login -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" id="username" placeholder="Ingrese su usuario" required autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="off">
                        <button type="button" class="password-toggle" id="togglePassword"
                            aria-label="Mostrar contraseña">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text" id="btnText">Iniciar Sesión</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <!-- Pie -->
            <div class="footer-info">
                Mi Voto <span class="separator">&copy;</span> 2026
                <span class="separator">|</span>
                <a href="#" target="_blank">Soporte Técnico</a>
            </div>
        </div>
    </div>

    <!-- Marca de agua -->
    <div class="watermark">MI VOTO &mdash; ASAMBLEAS</div>

    <script>
        // ========================
        // Mostrar/ocultar contraseña
        // ========================
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = togglePassword.querySelector('i');
            icon.className = type === 'password' ? 'far fa-eye' : 'far fa-eye-slash';
        });

        // ========================
        // Elementos del DOM
        // ========================
        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const errorDiv = document.getElementById('errorMsg');
        const usernameInput = document.getElementById('username');
        const passwordInputField = document.getElementById('password');

        // ========================
        // Efecto de partículas (opcional, más ligero que antes)
        // ========================
        function createParticles() {
            const container = document.createElement('div');
            container.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none; z-index: 1;
            `;
            document.body.appendChild(container);

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                const size = Math.random() * 3 + 1;
                particle.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    background: rgba(46, 204, 113, 0.3);
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation: floatParticle ${6 + Math.random() * 8}s infinite ease-in-out;
                    animation-delay: ${Math.random() * 10}s;
                `;
                container.appendChild(particle);
            }

            const style = document.createElement('style');
            style.textContent = `
                @keyframes floatParticle {
                    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.2; }
                    25% { transform: translate(20px, -30px) scale(1.5); opacity: 0.5; }
                    50% { transform: translate(-15px, -60px) scale(0.8); opacity: 0.3; }
                    75% { transform: translate(25px, -40px) scale(1.2); opacity: 0.4; }
                }
            `;
            document.head.appendChild(style);
        }
        createParticles();

        // ========================
        // Manejo del formulario
        // ========================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Mostrar estado de carga
            btnLogin.classList.add('loading');
            btnText.textContent = 'Verificando credenciales...';
            btnLogin.disabled = true;
            errorDiv.classList.remove('visible');

            const username = usernameInput.value.trim();
            const password = passwordInputField.value.trim();

            // Codificación Base64 con UTF-8
            const utf8Bytes = new TextEncoder().encode(JSON.stringify({ username, password }));
            const authPayload = btoa(String.fromCharCode(...utf8Bytes));

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ auth: authPayload })
                });

                const data = await response.json();

                if (data.success) {
                    // Guardar sesión
                    localStorage.setItem('mivoto_user', data.usuario);
                    localStorage.setItem('mivoto_token', data.token);

                    // Feedback visual de éxito
                    btnLogin.style.background = 'linear-gradient(135deg, #0D552C, #27AE60)';
                    btnText.textContent = '✓ Acceso Concedido';
                    btnLogin.classList.remove('loading');

                    // Redirigir después de breve pausa
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 600);
                } else {
                    throw new Error(data.message || 'Credenciales inválidas');
                }
            } catch (error) {
                console.error('Error de autenticación:', error);

                // Mostrar error
                errorDiv.classList.add('visible');
                passwordInputField.value = '';
                passwordInputField.focus();

                // Resetear botón
                btnText.textContent = 'Iniciar Sesión';
                btnLogin.style.background = '';
                btnLogin.classList.remove('loading');
                btnLogin.disabled = false;

                // Ocultar error después de 5 segundos
                setTimeout(() => {
                    errorDiv.classList.remove('visible');
                }, 5000);
            }
        });

        // ========================
        // Limpiar error al escribir
        // ========================
        [usernameInput, passwordInputField].forEach(input => {
            input.addEventListener('input', () => {
                if (errorDiv.classList.contains('visible')) {
                    errorDiv.classList.remove('visible');
                }
            });
        });
    </script>
</body>

</html>
