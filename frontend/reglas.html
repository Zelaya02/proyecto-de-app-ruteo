<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (!localStorage.getItem('nexo_token')) {
            window.location.href = 'login.html';
        }
    </script>
    <title>NEXO | Configuración de Reglas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary: linear-gradient(135deg, #5B6BFF 0%, #3DD7E5 100%);
            --secondary: #5B6BFF;
            --bg: #F0F2F6;
            --white: #FFFFFF;
            --text: #171A21;
            --border: #E2E5EB;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04);
        }

        body.dark-mode {
            --bg: #0A0B0F;
            --white: #14151C;
            --text: #F2F4F8;
            --border: #2A2D38;
            --primary: linear-gradient(135deg, #5B6BFF 0%, #3DD7E5 100%);
            --card-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.03) inset;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background 0.25s, color 0.25s;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2.5px solid var(--secondary);
            box-shadow: 0 4px 20px rgba(11, 43, 64, 0.16);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            box-shadow: var(--card-shadow);
            transition: all 0.25s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(11, 43, 64, 0.12);
        }

        .regla-item {
            display: grid;
            grid-template-columns: 1fr 150px 80px;
            gap: 20px;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .regla-item:last-child { border-bottom: none; }

        .categoria-name { font-weight: 600; text-transform: capitalize; }

        input[type="number"] {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            background: var(--bg);
            color: var(--text);
        }

        .switch {
            --circle-dim: 1em;
            font-size: 12px;
            position: relative;
            display: inline-block;
            width: 2.8em;
            height: 1.5em;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: background-color .3s;
            border-radius: 30px;
        }
        .slider-card {
            position: absolute;
            height: var(--circle-dim);
            width: var(--circle-dim);
            border-radius: 50%;
            left: 0.3em;
            bottom: 0.3em;
            background-color: #000;
            transition: transform .3s, background-color .3s;
            pointer-events: none;
            transform: translateX(0);
        }
        input:checked ~ .slider { background-color: #b3e5fc; }
        input:checked ~ .slider-card {
            transform: translateX(1.2em);
            background-color: #4FC3F7;
        }
        body.dark-mode input:checked ~ .slider { background-color: #5B6BFF; }
        body.dark-mode input:checked ~ .slider-card { background-color: #5B6BFF; }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .btn-save:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .btn-back {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-tasks"></i> Reglas de Ruteo</h1>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="margin-bottom: 10px;">Límites por Categoría</h2>
            <p style="color: #64748b; margin-bottom: 30px; font-size: 14px;">
                Define cuántos clientes de cada tipo puede llevar un mismo móvil como máximo.
                Usa <b>0</b> para indicar que no hay límite.
            </p>

            <div id="listaReglas">
                <!-- Se carga dinámicamente -->
                <div style="text-align:center; padding: 20px;">Cargando reglas...</div>
            </div>

            <button class="btn-save" onclick="guardarReglas()">
                <i class="fas fa-save"></i> Guardar Configuración
            </button>
        </div>
    </div>

    <script>
        const categoriasBasicas = ['supermercado', 'minorista/gastronómico', 'mayorista / distribuidor'];
        let reglasCargadas = [];

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Helper para peticiones con autenticación
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('nexo_token');
            if (!options.headers) options.headers = {};
            options.headers['Authorization'] = `Bearer ${token}`;
            
            const response = await fetch(url, options);
            if (response.status === 401) {
                alert("Sesión expirada o no válida. Por favor, inicie sesión de nuevo.");
                window.location.href = 'login.html';
            }
            return response;
        }

        async function cargarReglas() {
            try {
                const res = await fetchWithAuth('/api/reglas');
                reglasCargadas = await res.json();
                renderReglas();
            } catch (e) {
                console.error(e);
            }
        }

        function addCategoria() {
            const nueva = prompt("Ingrese el nombre de la nueva categoría:");
            if (nueva) {
                const cat = nueva.toLowerCase().trim();
                if (!reglasCargadas.find(r => r.categoria === cat)) {
                    reglasCargadas.push({
                        categoria: cat,
                        limite_por_movil: 0,
                        activo: true
                    });
                    renderReglas();
                }
            }
        }

        function renderReglas() {
            const container = document.getElementById('listaReglas');
            container.innerHTML = '';

            // Asegurar que las categorías básicas siempre aparezcan al menos para configurar
            const todas = [...reglasCargadas];
            categoriasBasicas.forEach(cat => {
                if (!todas.find(r => r.categoria.toLowerCase() === cat)) {
                    todas.push({ categoria: cat, limite_por_movil: 0, activo: false });
                }
            });

            todas.sort((a,b) => a.categoria.localeCompare(b.categoria)).forEach(regla => {
                const cat = regla.categoria.toLowerCase();
                const catEscaped = escapeHtml(cat);
                const div = document.createElement('div');
                div.className = 'regla-item';
                div.innerHTML = `
                    <div class="categoria-name">${catEscaped}</div>
                    <div>
                        <input type="number" value="${regla.limite_por_movil}" min="0" 
                               placeholder="Sin límite" style="width:100%;">
                    </div>
                    <div style="text-align: right; display: flex; align-items: center; gap: 10px; justify-content: flex-end;">
                        <label class="switch">
                            <input type="checkbox" class="toggle" ${regla.activo ? 'checked' : ''}>
                            <span class="slider"></span>
                            <span class="slider-card"></span>
                        </label>
                        <button onclick="eliminarReglaLocal('${catEscaped}')" style="background:none; border:none; color:#e74c3c; cursor:pointer;" title="Eliminar regla">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function eliminarReglaLocal(cat) {
            if (confirm(`¿Eliminar la regla para la categoría "${cat}"?`)) {
                try {
                    const res = await fetchWithAuth(`/api/reglas?categoria=${encodeURIComponent(cat)}`, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        reglasCargadas = reglasCargadas.filter(r => r.categoria !== cat);
                        renderReglas();
                    }
                } catch (e) {
                    alert("Error al eliminar la regla.");
                }
            }
        }

        async function guardarReglas() {
            const items = document.querySelectorAll('.regla-item');
            let hasNegative = false;
            const payload = Array.from(items).map(div => {
                const cat = div.querySelector('.categoria-name').textContent;
                const limitInput = div.querySelector('input[type="number"]');
                const activeInput = div.querySelector('input[type="checkbox"]');
                const limitVal = parseInt(limitInput.value) || 0;
                if (limitVal < 0) {
                    hasNegative = true;
                }
                return {
                    categoria: cat.trim(),
                    limite_por_movil: limitVal,
                    activo: activeInput.checked
                };
            });

            if (hasNegative) {
                alert("❌ El límite por móvil no puede ser negativo.");
                return;
            }

            mostrarLoader("Guardando reglas de ruteo...");
            try {
                const res = await fetchWithAuth('/api/reglas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert('✅ Reglas guardadas con éxito. Se aplicarán en el próximo ruteo.');
                    cargarReglas();
                }
            } catch (e) {
                alert('❌ Error al guardar las reglas.');
            } finally {
                ocultarLoader();
            }
        }

        function mostrarLoader(texto = "Optimizando rutas... por favor espere") {
            const overlay = document.getElementById('loadingOverlay');
            const textEl = document.getElementById('loadingText');
            if (textEl) textEl.innerText = texto;
            if (overlay) overlay.classList.add('active');
        }

        function ocultarLoader() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.remove('active');
        }

        // Cargar reglas automáticamente al iniciar la página
        document.addEventListener('DOMContentLoaded', cargarReglas);
    </script>

    <div style="text-align: center; margin-top: 20px;">
        <button class="btn-outline" onclick="addCategoria()" style="border: 2px dashed var(--primary); padding: 10px 20px; border-radius: 10px; cursor: pointer; background: transparent; color: var(--primary); font-weight: 600;">
            <i class="fas fa-plus"></i> Agregar Nueva Categoría
        </button>
    </div>

    <!-- PANTALLA DE CARGA GENERAL (CELESTE & DORADO GLASS CON CAMIÓN ANIMADO) -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="truckWrapper">
                <div class="truckBody">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 198 93" class="trucksvg">
                        <path stroke-width="3" stroke="#282828" fill="#F83D3D" d="M135 22.5H177.264C178.295 22.5 179.22 23.133 179.594 24.0939L192.33 56.8443C192.442 57.1332 192.5 57.4404 192.5 57.7504V89C192.5 90.3807 191.381 91.5 190 91.5H135C133.619 91.5 132.5 90.3807 132.5 89V25C132.5 23.6193 133.619 22.5 135 22.5Z"></path>
                        <path stroke-width="3" stroke="#282828" fill="#7D7C7C" d="M146 33.5H181.741C182.779 33.5 183.709 34.1415 184.078 35.112L190.538 52.112C191.16 53.748 189.951 55.5 188.201 55.5H146C144.619 55.5 143.5 54.3807 143.5 53V36C143.5 34.6193 144.619 33.5 146 33.5Z"></path>
                        <path stroke-width="2" stroke="#282828" fill="#282828" d="M150 65C150 65.39 149.763 65.8656 149.127 66.2893C148.499 66.7083 147.573 67 146.5 67C145.427 67 144.501 66.7083 143.873 66.2893C143.237 65.8656 143 65.39 143 65C143 64.61 143.237 64.1344 143.873 63.7107C144.501 63.2917 145.427 63 146.5 63C147.573 63 148.499 63.2917 149.127 63.7107C149.763 64.1344 150 64.61 150 65Z"></path>
                        <rect stroke-width="2" stroke="#282828" fill="#FFFCAB" rx="1" height="7" width="5" y="63" x="187"></rect>
                        <rect stroke-width="2" stroke="#282828" fill="#282828" rx="1" height="11" width="4" y="81" x="193"></rect>
                        <rect stroke-width="3" stroke="#282828" fill="#DFDFDF" rx="2.5" height="90" width="121" y="1.5" x="6.5"></rect>
                        <rect stroke-width="2" stroke="#282828" fill="#DFDFDF" rx="2" height="4" width="6" y="84" x="1"></rect>
                    </svg>
                </div>
                <div class="truckTires">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 30 30" class="tiresvg">
                        <circle stroke-width="3" stroke="#282828" fill="#282828" r="13.5" cy="15" cx="15"></circle>
                        <circle fill="#DFDFDF" r="7" cy="15" cx="15"></circle>
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 30 30" class="tiresvg">
                        <circle stroke-width="3" stroke="#282828" fill="#282828" r="13.5" cy="15" cx="15"></circle>
                        <circle fill="#DFDFDF" r="7" cy="15" cx="15"></circle>
                    </svg>
                </div>
                <div class="road"></div>
            </div>
        </div>
        <div class="loading-text" id="loadingText">Optimizando rutas... por favor espere</div>
    </div>
    <script>
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
