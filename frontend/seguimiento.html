<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (!localStorage.getItem('nexo_token')) {
            window.location.href = 'login.html';
        }
    </script>
    <title>NEXO | Seguimiento de Entregas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary: linear-gradient(135deg, #5B6BFF 0%, #3DD7E5 100%);
            --secondary: #5B6BFF;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg: #F0F2F6;
            --white: #FFFFFF;
            --text-color: #171A21;
            --border: #E2E5EB;
            --card-shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04);
        }

        body.dark-mode {
            --bg: #0A0B0F;
            --white: #14151C;
            --text-color: #F2F4F8;
            --border: #2A2D38;
            --primary: linear-gradient(135deg, #5B6BFF 0%, #3DD7E5 100%);
            --card-shadow: 0 8px 24px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.03) inset;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-color);
            transition: all 0.25s ease;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2.5px solid var(--secondary);
            box-shadow: 0 4px 20px rgba(11, 43, 64, 0.16);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab {
            padding: 12px 25px;
            background: var(--white);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            border: 1px solid var(--border);
            white-space: nowrap;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--card-shadow);
        }

        .tab.active {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
            box-shadow: 0 4px 12px rgba(200, 157, 74, 0.35);
        }

        .card {
            background: var(--white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 15px;
            border: 1.5px solid var(--border);
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            transition: all 0.25s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(11, 43, 64, 0.12);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            padding: 15px;
            background: rgba(30, 58, 95, 0.05);
            border-bottom: 2px solid var(--border);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-entregado { color: var(--success); font-weight: bold; }
        .status-rechazado { color: var(--danger); font-weight: bold; }
        .status-pendiente { color: var(--warning); font-weight: bold; }

        .btn-back {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-back:hover { background: rgba(255,255,255,0.2); }

        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 43, 64, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

                </svg>
            </div>
        </div>
        <div class="loading-text" id="loadingText">Obteniendo estado de entregas... por favor espere</div>
    </div>

    <div class="header">
        <h1><i class="fas fa-map-marked-alt"></i> Estado de Entregas</h1>
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="date" id="inputFecha" onchange="cargarDatos()" style="padding:8px; border-radius:8px; border:none; background:rgba(255,255,255,0.1); color:white; color-scheme: dark;">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
    </div>

    <div class="container">
        <div id="tabsMoviles" class="tabs">
            <!-- Se carga dinámicamente -->
        </div>

        <div class="card">
            <h2 id="tituloMovil">Selecciona un móvil</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha/Hora</th>
                            <th>Cliente</th>
                            <th>Estado</th>
                            <th>Observación / Respuesta</th>
                        </tr>
                    </thead>
                    <tbody id="tablaSeguimiento">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: #999;">
                                Cargando información de entregas...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- TEMPORIZADOR DE INACTIVIDAD (5 MINUTOS) ---
        let inactivityTimer;
        function resetTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                localStorage.removeItem('nexo_user');
                localStorage.removeItem('nexo_token');
                alert("Sesión expirada por inactividad.");
                window.location.href = 'login.html';
            }, 5 * 60 * 1000); 
        }
        document.addEventListener('mousemove', resetTimer);
        document.addEventListener('keypress', resetTimer);
        resetTimer();

        // Initialize Dark Mode from localStorage
        (function initDarkMode() {
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
            }
        })();

        let allReportes = [];
        let movilesUnicos = [];

        // Helper para peticiones con autenticación
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('nexo_token');
            if (!options.headers) options.headers = {};
            options.headers['Authorization'] = `Bearer ${token}`;
            
            const response = await fetch(url, options);
            if (response.status === 401) {
                alert("Sesión expirada o no válida. Por favor, inicie sesión de nuevo.");
                window.location.href = 'login.html';
            }
            return response;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const fechaParam = urlParams.get('fecha');
            if (fechaParam) {
                document.getElementById('inputFecha').value = fechaParam;
            }
            await cargarDatos();
        });

        async function cargarDatos() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading').style.opacity = '1';
            
            const fecha = document.getElementById('inputFecha').value;
            let url = '/api/reportes';
            if (fecha) url += `?fecha=${fecha}`;

            try {
                const res = await fetchWithAuth(url);
                allReportes = await res.json();
                
                // Extraer móviles únicos
                const movilesSet = new Set(allReportes.map(r => r.movil));
                movilesUnicos = Array.from(movilesSet).sort((a,b) => a - b);
                
                renderTabs();
                if(movilesUnicos.length > 0) {
                    seleccionarMovil(movilesUnicos[0]);
                } else {
                    document.getElementById('tablaSeguimiento').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">No hay datos de entregas para esta fecha.</td></tr>';
                }

            } catch (error) {
                console.error(error);
            } finally {
                const loading = document.getElementById('loading');
                loading.style.opacity = '0';
                setTimeout(() => loading.style.display = 'none', 500);
            }
        }

        function renderTabs() {
            const container = document.getElementById('tabsMoviles');
            container.innerHTML = movilesUnicos.map(m => `
                <div class="tab" id="tab-${m}" onclick="seleccionarMovil(${m})">
                    <i class="fas fa-truck"></i> Móvil #${m}
                </div>
            `).join('');
        }

        function seleccionarMovil(movil) {
            // UI Update
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const tab = document.getElementById(`tab-${movil}`);
            if(tab) tab.classList.add('active');
            
            // Filter data
            const filtrados = allReportes.filter(r => r.movil === movil);
            const tbody = document.getElementById('tablaSeguimiento');
            
            const primerReporte = filtrados[0];
            const choferNombre = (primerReporte && primerReporte.chofer) ? primerReporte.chofer : 'Sin chofer';
            const vehiculoNombre = (primerReporte && primerReporte.vehiculo) ? primerReporte.vehiculo : 'Sin vehículo';
            
            document.getElementById('tituloMovil').innerHTML = `
                <i class="fas fa-info-circle"></i> Entregas del Móvil #${movil}
                <div style="font-size: 14px; font-weight: normal; color: var(--text-color); opacity: 0.8; margin-top: 8px; display: flex; gap: 15px; flex-wrap: wrap;">
                    <span><i class="fas fa-user-tie" style="color: var(--secondary);"></i> <strong>Chofer:</strong> ${choferNombre}</span>
                    <span><i class="fas fa-truck" style="color: var(--secondary);"></i> <strong>Vehículo:</strong> ${vehiculoNombre}</span>
                </div>
            `;
            
            tbody.innerHTML = filtrados.map(r => {
                const statusClass = `status-${r.estado.toLowerCase()}`;
                const icon = r.estado === 'entregado' ? 'fa-check-circle' : r.estado === 'rechazado' ? 'fa-times-circle' : 'fa-clock';
                const fecha = new Date(r.fecha).toLocaleString('es-PY', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    day: '2-digit',
                    month: '2-digit'
                });

                return `
                    <tr>
                        <td style="color: #666; font-size: 13px;">${fecha}</td>
                        <td><strong>${r.cliente}</strong></td>
                        <td>
                            <span class="${statusClass}">
                                <i class="fas ${icon}"></i> ${r.estado.toUpperCase()}
                            </span>
                        </td>
                        <td style="font-style: italic; color: #555;">
                            ${r.observacion || '<span style="color:#ccc">Sin observaciones</span>'}
                        </td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
